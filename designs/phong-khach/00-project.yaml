room:
  width_cm: 500          # cạnh ngang (tường N/S)
  depth_cm: 600          # cạnh dọc (tường E/W)
  height_cm: 280         # ước lượng từ user nói "2.8m"
  doors:
    - wall: W             # cửa phía Tây; trùng tường W trên bản vẽ
      offset_cm: 255      # giữa tường W (đo dọc trục y: (600-90)/2)
      width_cm: 90        # mặc định cửa đơn tiêu chuẩn — user xác nhận
      swing: in-left      # mở vào trong, bản lề đầu offset nhỏ (phía trên)
  windows:
    - wall: E             # cửa sổ phía Đông; nguồn sáng chính (nắng sáng)
      offset_cm: 200      # giữa tường E (đo dọc trục y: (600-200)/2)
      width_cm: 200
      height_cm: 150
      sill_cm: 90         # mặc định — user xác nhận
  sun: dong              # cửa sổ quay hướng Đông (la bàn) → nắng buổi sáng
  notes:
    - "Cửa sổ hướng Đông (tường E) là nguồn sáng tự nhiên chính — tận dụng để giải nỗi đau thiếu sáng."
    - "Cao trần 280cm ước lượng từ user nói '2.8m', chưa đo lại."
    - "Kích thước cửa (90cm) và bệ cửa sổ (90cm) dùng mặc định tiêu chuẩn, user xác nhận, chưa đo thực tế."
    - "Chưa khảo sát vị trí ổ điện / công tắc / điều hoà / hộp kỹ thuật — cần đo trước bước layout chi tiết."
